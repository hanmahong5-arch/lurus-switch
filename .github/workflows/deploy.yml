name: Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

env:
  GO_VERSION: '1.25'

jobs:
  build:
    name: Build Wails App
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            binary: lurus-switch.exe
          - os: macos-latest
            platform: darwin/universal
            binary: lurus-switch
          - os: ubuntu-latest
            platform: linux/amd64
            binary: lurus-switch
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: oven-sh/setup-bun@v1

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build frontend
        working-directory: frontend
        run: bun install && bun run build

      - name: Build Wails app
        run: wails build -platform ${{ matrix.platform }} -ldflags "-X main.AppVersion=${{ github.ref_name }}" -o ${{ matrix.binary }}

      - name: Generate SHA-256 checksum
        shell: bash
        run: |
          sha256sum build/bin/${{ matrix.binary }} > build/bin/${{ matrix.binary }}.sha256
          cat build/bin/${{ matrix.binary }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: lurus-switch-${{ matrix.os }}
          path: |
            build/bin/${{ matrix.binary }}
            build/bin/${{ matrix.binary }}.sha256

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## Changes in ${{ github.ref_name }}

            ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*
