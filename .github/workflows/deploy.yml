name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string

env:
  GO_VERSION: "1.25"
  APP_NAME: "lurus-switch"

jobs:
  build:
    name: Build — ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            output: lurus-switch.exe
            asset_name: lurus-switch-windows-amd64.exe
          - os: macos-latest
            platform: darwin/universal
            output: lurus-switch
            asset_name: lurus-switch-darwin-universal
          - os: ubuntu-22.04
            platform: linux/amd64
            output: lurus-switch
            asset_name: lurus-switch-linux-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: oven-sh/setup-bun@v2

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Resolve version tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build Wails app
        shell: bash
        run: |
          wails build \
            -platform ${{ matrix.platform }} \
            -ldflags "-s -w -X main.AppVersion=${{ steps.version.outputs.tag }}" \
            -o ${{ matrix.output }}

      - name: Rename & checksum
        shell: bash
        run: |
          cd build/bin
          cp ${{ matrix.output }} ${{ matrix.asset_name }}
          sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
          cat ${{ matrix.asset_name }}.sha256

      - name: Create Windows NSIS installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # Generate NSIS script
          @"
          !include "MUI2.nsh"
          Name "Lurus Switch"
          OutFile "build\bin\lurus-switch-setup-windows-amd64.exe"
          InstallDir "`$LOCALAPPDATA\Lurus Switch"
          RequestExecutionLevel user

          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_LANGUAGE "English"
          !insertmacro MUI_LANGUAGE "SimpChinese"

          Section "Install"
            SetOutPath "`$INSTDIR"
            File "build\bin\${{ matrix.output }}"
            CreateShortCut "`$DESKTOP\Lurus Switch.lnk" "`$INSTDIR\${{ matrix.output }}"
            CreateDirectory "`$SMPROGRAMS\Lurus Switch"
            CreateShortCut "`$SMPROGRAMS\Lurus Switch\Lurus Switch.lnk" "`$INSTDIR\${{ matrix.output }}"
            CreateShortCut "`$SMPROGRAMS\Lurus Switch\Uninstall.lnk" "`$INSTDIR\uninstall.exe"
            WriteUninstaller "`$INSTDIR\uninstall.exe"
            WriteRegStr HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\LurusSwitch" "DisplayName" "Lurus Switch"
            WriteRegStr HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\LurusSwitch" "UninstallString" "`$INSTDIR\uninstall.exe"
            WriteRegStr HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\LurusSwitch" "DisplayVersion" "${{ steps.version.outputs.tag }}"
            WriteRegStr HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\LurusSwitch" "Publisher" "Lurus"
          SectionEnd

          Section "Uninstall"
            Delete "`$INSTDIR\${{ matrix.output }}"
            Delete "`$INSTDIR\uninstall.exe"
            Delete "`$DESKTOP\Lurus Switch.lnk"
            RMDir /r "`$SMPROGRAMS\Lurus Switch"
            RMDir "`$INSTDIR"
            DeleteRegKey HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\LurusSwitch"
          SectionEnd
          "@ | Out-File -Encoding ASCII installer.nsi
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Checksum installer
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd build/bin
          sha256sum lurus-switch-setup-windows-amd64.exe > lurus-switch-setup-windows-amd64.exe.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: build/bin/lurus-switch-*
          retention-days: 7

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Resolve version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          {
            echo "body<<CHANGELOG_EOF"
            echo "$LOG"
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Lurus Switch ${{ steps.version.outputs.tag }}
          body: |
            ## Lurus Switch ${{ steps.version.outputs.tag }}

            ### Downloads

            | Platform | File | Type |
            |----------|------|------|
            | Windows | `lurus-switch-setup-windows-amd64.exe` | Installer (recommended) |
            | Windows | `lurus-switch-windows-amd64.exe` | Portable |
            | macOS | `lurus-switch-darwin-universal` | Universal binary |
            | Linux | `lurus-switch-linux-amd64` | Binary |

            ### Changes

            ${{ steps.changelog.outputs.body }}

            ---
            Verify checksums: `sha256sum -c <file>.sha256`
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, 'alpha') || contains(steps.version.outputs.tag, 'beta') || contains(steps.version.outputs.tag, 'rc') }}
          files: artifacts/lurus-switch-*

  # Upload release binaries to the www server so nginx can serve
  # them at /releases/lurus-switch/<tag>/ (static fallback for Download page).
  # Requires secrets: DEPLOY_SSH_KEY (private key), DEPLOY_HOST, DEPLOY_USER
  sync-to-server:
    name: Sync to Download Server
    runs-on: ubuntu-latest
    needs: release
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Resolve version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload to server
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          TAG="${{ steps.version.outputs.tag }}"
          REMOTE_DIR="/opt/releases/lurus-switch/${TAG}"

          ssh -i ~/.ssh/deploy_key "${USER}@${HOST}" "mkdir -p ${REMOTE_DIR}"
          scp -i ~/.ssh/deploy_key artifacts/lurus-switch-* "${USER}@${HOST}:${REMOTE_DIR}/"

          echo "Uploaded to ${REMOTE_DIR}:"
          ssh -i ~/.ssh/deploy_key "${USER}@${HOST}" "ls -lh ${REMOTE_DIR}/"

          # Clean up
          rm -f ~/.ssh/deploy_key
